included:
  - nodeseek
  - nodeseekTests

excluded:
  - .build
  - .swiftpm
  - docs
  - screenshots

only_rules:
  - colon
  - comma
  - opening_brace
  - operator_usage_whitespace
  - return_arrow_whitespace
  - statement_position
  - syntactic_sugar
  - trailing_newline
  - trailing_whitespace
  - vertical_whitespace
  - void_return

warning_threshold: 1

trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: false

vertical_whitespace:
  max_empty_lines: 2
